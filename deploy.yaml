# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: monitor-system
  labels:
    name: monitor-system
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-image-monitor
  namespace: monitor-system
---
# ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-image-monitor
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-image-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pod-image-monitor
subjects:
  - kind: ServiceAccount
    name: pod-image-monitor
    namespace: monitor-system
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-image-monitor
  namespace: monitor-system
  labels:
    app: pod-image-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod-image-monitor
  template:
    metadata:
      labels:
        app: pod-image-monitor
    spec:
      serviceAccountName: pod-image-monitor
      containers:
        - name: monitor
          image: ghcr.io/zijiren233/image-monitor:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1024Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: pod-image-monitor
  namespace: monitor-system
  labels:
    app: pod-image-monitor
spec:
  selector:
    app: pod-image-monitor
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
# VMServiceScrape for VictoriaMetrics
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: pod-image-monitor
  namespace: monitor-system
  labels:
    app: pod-image-monitor
spec:
  selector:
    matchLabels:
      app: pod-image-monitor
  endpoints:
    - port: metrics
      path: /metrics
      interval: 10s
      scrapeTimeout: 10s
      honorLabels: false
      params: {}
  namespaceSelector:
    matchNames:
      - monitor-system
